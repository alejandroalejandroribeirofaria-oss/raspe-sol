<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Raspe SOL | Raspadinha Digital na Solana</title>
    <meta
      name="description"
      content="Raspe SOL: raspadinha digital baseada em blockchain Solana com lotes auditáveis e transparência total."
    />
    <meta name="theme-color" content="#7C3AED" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />

    <!-- Open Graph pra compartilhar no WhatsApp/Twitter -->
    <meta property="og:title" content="Raspe SOL" />
    <meta property="og:description" content="Raspadinha digital na Solana com lotes auditáveis" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:type" content="website" />

    <!-- Segurança básica -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <style>
      /* Botões de idioma no canto superior direito */
      #lang-switcher {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 9999;
        display: flex;
        gap: 8px;
      }
      #lang-switcher button {
        font-size: 24px;
        background: rgba(0,0,0,0.3);
        border: none;
        border-radius: 8px;
        padding: 4px 8px;
        cursor: pointer;
        transition: transform 0.2s;
      }
      #lang-switcher button:hover {
        transform: scale(1.1);
      }
      #lang-switcher button.active {
        background: rgba(124, 58, 237, 0.8); /* roxo do theme-color */
      }
    </style>
  </head>
  <body>
    <!-- SELETOR DE BANDEIRA VOLTOU -->
    <div id="lang-switcher"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Script simples pra renderizar as bandeiras antes do React subir
      const languages = [
        { code: 'pt', flag: '🇧🇷' },
        { code: 'en', flag: '🇺🇸' },
        { code: 'zh', flag: '🇨🇳' }
      ];
      const currentLang = localStorage.getItem('lang') || 'pt';
      const container = document.getElementById('lang-switcher');

      languages.forEach(l => {
        const btn = document.createElement('button');
        btn.innerText = l.flag;
        if(l.code === currentLang) btn.classList.add('active');
        btn.onclick = () => {
          localStorage.setItem('lang', l.code);
          window.location.reload();
        };
        container.appendChild(btn);
      });
    </script>
  </body>
</html>
